<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Modern Slider</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        
    </style>
</head>
<body>



<div id="heroCarousel" class="carousel slide carusel-inner" data-bs-ride="carousel">
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="https://images.unsplash.com/photo-1542838132-92c53300491e" alt="Office">
            <div class="hero-content">
                <h1>Your productivity, supercharged</h1>
                <p>Microsoft 365 delivers cloud storage, advanced security, and Copilot.</p>
                <button class="btn btn-ms">Shop Microsoft 365</button>
            </div>
        </div>

        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&q=80&w=2070" alt="Work">
            <div class="hero-content">
                <h1>Designed for the future of work</h1>
                <p>Discover how AI is transforming every industry.</p>
                <button class="btn btn-ms">Learn More</button>
            </div>
        </div>
    </div>

    </div>
    <div class="ms-controls mt-2 mb-5 ">
        <div class="control-circle" onclick="btnPrev()">
            <span style="transform: scaleX(-1);">➔</span>
        </div>

        <div class="play-pause-container">
            <div class="progress-line"><div class="progress-active" id="bar"></div></div>
            <div id="playPauseBtn" style="cursor:pointer; width: 20px;">⏸</div>
        </div>

        <div class="control-circle" onclick="btnNext()">
            <span>➔</span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const myCarousel = document.querySelector('#heroCarousel');
    const carousel = new bootstrap.Carousel(myCarousel, {
        interval: 5000,
        pause: false
    });

    const playPauseBtn = document.getElementById('playPauseBtn');
    let isPaused = false;

    // Toggle Play/Pause
    playPauseBtn.addEventListener('click', () => {
        if (isPaused) {
            carousel.cycle();
            playPauseBtn.innerText = '⏸';
        } else {
            carousel.pause();
            playPauseBtn.innerText = '▶';
        }
        isPaused = !isPaused;
    });

    // Arrow Functions
    function btnNext() { carousel.next(); }
    function btnPrev() { carousel.prev(); }

    // Simple Progress Bar Animation Logic
    let progress = 0;
    const bar = document.getElementById('bar');
    setInterval(() => {
        if (!isPaused) {
            progress += 1;
            if (progress > 100) progress = 0;
            bar.style.width = progress + '%';
        }
    }, 50);

    // Reset bar on slide change
    myCarousel.addEventListener('slide.bs.carousel', () => {
        progress = 0;
    });
</script>

</body>
</html>
